<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VocKO TOEIC Scanner</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        width: 360px;
        color: #e2e8f0;
        background: #0f172a;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 10px;
        background: #22c55e;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      pre {
        margin-top: 12px;
        padding: 12px;
        border-radius: 12px;
        background: #1e293b;
        color: #cbd5e1;
        font-size: 12px;
        max-height: 280px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h1 style="font-size: 1.1rem; margin-bottom: 12px;">VocKO TOEIC Scanner</h1>
    <button id="scanButton">Scan current page</button>
    <pre id="output">Press scan to inspect the page DOM.</pre>
    <script src="popup.js"></script>
  </body>
</html>
